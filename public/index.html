<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vexel - Premium Wallpaper Community</title>
    <style>
        body {
            background-color: #0a0c10;
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .container { text-align: center; }
        h1 {
            font-size: 60px;
            letter-spacing: 15px;
            margin: 0;
            background: linear-gradient(135deg, #3b82f6, #d6bee7);
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }
        p {
            color: #566375;
            font-size: 14px;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 10px;
        }
        .links {
            margin-top: 40px;
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        a {
            color: #3b82f6;
            text-decoration: none;
            font-size: 12px;
            font-weight: bold;
            opacity: 0.6;
            transition: opacity 0.3s;
        }
        a:hover { opacity: 1; }
    </style>
</head>
<body>
    <div class="container">
        <h1>VEXEL</h1>
        <p>Premium Wallpaper Community</p>
        <div class="links">
            <a href="/privacy">PRIVACY POLICY</a>
            <a href="/delete-account">SUPPORT</a>
        </div>
    </div>
</body>
</html>
